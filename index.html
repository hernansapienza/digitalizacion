<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Digitalización - Enterprise</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --sidebar-width: 240px;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MENÚ LATERAL --- */
        nav {
            width: var(--sidebar-width);
            background-color: #020617;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .brand {
            padding: 0 20px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
        }

        .nav-link {
            padding: 15px 20px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background-color: #1e293b;
            color: white;
            border-left: 4px solid var(--accent);
        }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }

        /* --- BARRA DE FILTROS --- */
        .filter-bar {
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        select, input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }

        /* --- SECCIONES --- */
        .section { display: none; }
        .section.active { display: block; }

        /* --- DISEÑO DE TARJETAS Y GRILLA --- */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .kpi-card span { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; }
        .kpi-card h2 { font-size: 2rem; margin: 10px 0 0; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-container {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            height: 400px;
        }

        /* --- CARGA --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center;
            align-items: center; z-index: 1000; font-weight: bold; color: var(--accent);
        }
    </style>
</head>
<body>

    <div id="loader">INICIALIZANDO SISTEMAS NOC...</div>

    <nav>
        <div class="brand">NOC Digitalización</div>
        <div class="nav-link active" onclick="showSection('general')">Vista General</div>
        <div class="nav-link" onclick="showSection('usuarios')">Detalle Operadores</div>
    </nav>

    <main>
        <div class="filter-bar">
            <div>
                <label>Periodo:</label>
                <select id="filtro-fecha" onchange="procesarDatos()">
                    <option value="todo">Todo el historial</option>
                    <option value="3dias">Últimos 3 días</option>
                    <option value="mes">Este mes</option>
                    <option value="12meses">Últimos 12 meses</option>
                </select>
            </div>
            <div id="wrapper-usuario" style="display: none;">
                <label>Operador:</label>
                <select id="filtro-usuario" onchange="procesarDatos()">
                    </select>
            </div>
            <div style="margin-left: auto; color: #64748b; font-size: 0.8rem;">
                Sincronizado: <span id="last-update">-</span>
            </div>
        </div>

        <div id="general" class="section active">
            <div class="kpi-grid">
                <div class="kpi-card"><span>Total Imágenes</span><h2 id="total-img">0</h2></div>
                <div class="kpi-card"><span>Hojas Preparadas</span><h2 id="total-prep">0</h2></div>
                <div class="kpi-card"><span>Auditoría</span><h2 id="total-audi">0</h2></div>
                <div class="kpi-card"><span>Operadores Activos</span><h2 id="total-ops">0</h2></div>
            </div>
            <div class="charts-grid">
                <div class="chart-container"><canvas id="chart-ops"></canvas></div>
                <div class="chart-container"><canvas id="chart-gerencias"></canvas></div>
            </div>
        </div>

        <div id="usuarios" class="section">
            <div class="kpi-grid">
                <div class="kpi-card" style="border-color: var(--success);"><span>Digitalizado</span><h2 id="user-dig">0</h2></div>
                <div class="kpi-card" style="border-color: var(--warning);"><span>Auditado</span><h2 id="user-audi">0</h2></div>
                <div class="kpi-card" style="border-color: var(--accent);"><span>Preparado/Rearme</span><h2 id="user-prep">0</h2></div>
            </div>
            <div class="chart-container" style="width: 100%;"><canvas id="chart-user-history"></canvas></div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN: PEGA TUS ENLACES AQUÍ
        const URL_1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjnc4oKgXB3wo-1OXxpAEsAfhDl3aB4SFwHioXXmsYqQE-r3RU9S7RPhap-PEaO5_vVw-LDK6FRSoP/pub?gid=967153503&single=true&output=csv"; 
        const URL_2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjnc4oKgXB3wo-1OXxpAEsAfhDl3aB4SFwHioXXmsYqQE-r3RU9S7RPhap-PEaO5_vVw-LDK6FRSoP/pub?gid=161196298&single=true&output=csv2";

        let dataRaw1 = [];
        let dataRaw2 = [];
        let charts = {};

        // Inicialización
        window.onload = async () => {
            await cargarDatos();
            document.getElementById('loader').style.display = 'none';
        };

        async function cargarDatos() {
            return new Promise(resolve => {
                Papa.parse(URL_1, {
                    download: true, header: true,
                    complete: (r1) => {
                        dataRaw1 = r1.data;
                        Papa.parse(URL_2, {
                            download: true, header: true,
                            complete: (r2) => {
                                dataRaw2 = r2.data;
                                popularUsuarios();
                                procesarDatos();
                                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
                                resolve();
                            }
                        });
                    }
                });
            });
        }

        function popularUsuarios() {
            const users = new Set();
            dataRaw1.forEach(f => {
                if(f.user) users.add(f.user);
                if(f.auditor) users.add(f.auditor);
                if(f.preparador) users.add(f.preparador);
                if(f.rearmador) users.add(f.rearmador);
            });
            const select = document.getElementById('filtro-usuario');
            select.innerHTML = Array.from(users).sort().map(u => `<option value="${u}">${u}</option>`).join('');
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            
            document.getElementById('wrapper-usuario').style.display = (id === 'usuarios') ? 'block' : 'none';
            procesarDatos();
        }

        // --- LÓGICA DE FILTRADO DE FECHAS ---
        function cumpleFecha(fechaStr, filtro) {
            if (!fechaStr || filtro === 'todo') return true;
            const fecha = new Date(fechaStr.split('/').reverse().join('-')); // Asumiendo DD/MM/YYYY
            const hoy = new Date();
            
            if (filtro === '3dias') {
                const limite = new Date();
                limite.setDate(hoy.getDate() - 3);
                return fecha >= limite;
            }
            if (filtro === 'mes') {
                return fecha.getMonth() === hoy.getMonth() && fecha.getFullYear() === hoy.getFullYear();
            }
            if (filtro === '12meses') {
                const limite = new Date();
                limite.setFullYear(hoy.getFullYear() - 1);
                return fecha >= limite;
            }
            return true;
        }

        function procesarDatos() {
            const filtroFecha = document.getElementById('filtro-fecha').value;
            const userSel = document.getElementById('filtro-usuario').value;
            const seccionActiva = document.querySelector('.section.active').id;

            // Filtrar Hoja 1
            const f1 = dataRaw1.filter(f => {
                const f_ref = f.fecha_digitalizado || f.fecha_auditado || f.fecha_preparado;
                return cumpleFecha(f_ref, filtroFecha);
            });

            if (seccionActiva === 'general') {
                renderGeneral(f1, filtroFecha);
            } else {
                renderUser(f1, userSel);
            }
        }

        function renderGeneral(data, filtro) {
            const ops = {};
            const gens = {};
            let tImg = 0, tPrep = 0, tAudi = 0;

            data.forEach(f => {
                const status = (f.status || '').toLowerCase();
                if (status === 'digitalizado') {
                    tImg += parseInt(f.ima_dig || 0);
                    ops[f.user] = (ops[f.user] || 0) + parseInt(f.ima_dig || 0);
                }
                if (status === 'auditado') tAudi += parseInt(f.ima_audi || 0);
                if (status === 'preparado') tPrep += parseInt(f.hojas_prep || 0);
                
                if (f.gerencia) gens[f.gerencia] = (gens[f.gerencia] || 0) + parseInt(f.ima_dig || 0);
            });

            document.getElementById('total-img').innerText = tImg.toLocaleString();
            document.getElementById('total-prep').innerText = tPrep.toLocaleString();
            document.getElementById('total-audi').innerText = tAudi.toLocaleString();
            document.getElementById('total-ops').innerText = Object.keys(ops).length;

            updateChart('chart-ops', 'bar', Object.keys(ops), Object.values(ops), 'Imágenes por Operador', varColor('--accent'));
            updateChart('chart-gerencias', 'doughnut', Object.keys(gens), Object.values(gens), 'Distribución Gerencias');
        }

        function renderUser(data, user) {
            let uDig = 0, uAudi = 0, uPrep = 0;
            const historico = {};

            data.forEach(f => {
                const esUser = (f.user === user || f.auditor === user || f.preparador === user || f.rearmador === user);
                if (!esUser) return;

                const fecha = f.fecha_digitalizado || f.fecha_auditado || f.fecha_preparado;
                if (!historico[fecha]) historico[fecha] = 0;

                if (f.user === user) { uDig += parseInt(f.ima_dig || 0); historico[fecha] += parseInt(f.ima_dig || 0); }
                if (f.auditor === user) { uAudi += parseInt(f.ima_audi || 0); historico[fecha] += parseInt(f.ima_audi || 0); }
                if (f.preparador === user) uPrep += parseInt(f.hojas_prep || 0);
            });

            document.getElementById('user-dig').innerText = uDig.toLocaleString();
            document.getElementById('user-audi').innerText = uAudi.toLocaleString();
            document.getElementById('user-prep').innerText = uPrep.toLocaleString();

            const labels = Object.keys(historico).sort();
            updateChart('chart-user-history', 'line', labels, labels.map(l => historico[l]), 'Evolución de Producción', varColor('--success'));
        }

        function updateChart(id, type, labels, data, label, color) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: color || ['#38bdf8', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'],
                        borderColor: color,
                        tension: 0.3
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8' } } },
                    scales: type !== 'doughnut' ? {
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                    } : {}
                }
            });
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    </script>
</body>
</html>
