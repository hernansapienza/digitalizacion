<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Dashboard - Digitalización</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        /* Diseño Visual NOC */
        body {
            background-color: #0f172a; /* Azul noche profundo */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }
        
        /* Tarjetas de Métricas */
        .kpi-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background-color: #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }
        .kpi-card:hover { transform: translateY(-5px); }
        .kpi-title { font-size: 15px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        .kpi-value { font-size: 40px; font-weight: bold; margin-top: 10px; }
        
        /* Contenedor de Gráficos */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .chart-box {
            background-color: #1e293b;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            position: relative;
            height: 400px; /* Altura fija para mantener proporción */
        }
        .chart-title {
            text-align: center;
            color: #cbd5e1;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .charts-container { grid-template-columns: 1fr; }
            .kpi-container { flex-direction: column; }
            .chart-box { height: 350px; }
        }
        
        /* Pantalla de Carga */
        #loading {
            text-align: center; color: #10b981; font-size: 1.2rem; font-weight: bold; padding: 20px;
        }
    </style>
</head>
<body>

    <h1>🖥️ Tablero de Operaciones - Digitalización</h1>

    <div id="loading">Sincronizando datos con la base... ⏳</div>

    <div class="kpi-container" id="kpi-panel" style="display: none;">
        <div class="kpi-card" style="border-color: #10b981;">
            <div class="kpi-title">Total Imágenes Digitalizadas</div>
            <div class="kpi-value" style="color: #10b981;" id="kpi-total-img">0</div>
        </div>
        <div class="kpi-card" style="border-color: #f59e0b;">
            <div class="kpi-title">Operadores Activos</div>
            <div class="kpi-value" style="color: #f59e0b;" id="kpi-operadores">0</div>
        </div>
        <div class="kpi-card" style="border-color: #8b5cf6;">
            <div class="kpi-title">Última Actualización del Tablero</div>
            <div class="kpi-value" style="color: #8b5cf6;" id="kpi-hora">-</div>
        </div>
    </div>

    <div class="charts-container" id="charts-panel" style="display: none;">
        <div class="chart-box">
            <h3 class="chart-title">Rendimiento Detallado por Operador</h3>
            <canvas id="graficoOperadores"></canvas>
        </div>
        <div class="chart-box">
            <h3 class="chart-title">Volumen de Digitalización por Gerencia</h3>
            <canvas id="graficoGerencias"></canvas>
        </div>
    </div>

    <script>
        // =====================================================================
        // ⚠️ HERNÁN: PEGA TUS ENLACES ACÁ ADENTRO DE LAS COMILLAS ⚠️
        // =====================================================================
        const URL_HOJA_1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjnc4oKgXB3wo-1OXxpAEsAfhDl3aB4SFwHioXXmsYqQE-r3RU9S7RPhap-PEaO5_vVw-LDK6FRSoP/pub?gid=967153503&single=true&output=csv"; 
        const URL_HOJA_2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjnc4oKgXB3wo-1OXxpAEsAfhDl3aB4SFwHioXXmsYqQE-r3RU9S7RPhap-PEaO5_vVw-LDK6FRSoP/pub?gid=161196298&single=true&output=csv";
        // =====================================================================

        // 1. Reloj de actualización
        function actualizarHora() {
            const ahora = new Date();
            document.getElementById('kpi-hora').innerText = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(actualizarHora, 60000);
        actualizarHora();

        // 2. Procesamiento de Datos
        if (!URL_HOJA_1.includes("PEGA_AQUI")) {
            
            // Primero leemos la Hoja 1 (Operadores)
            Papa.parse(URL_HOJA_1, {
                download: true,
                header: true,
                complete: function(resultadosHoja1) {
                    
                    const operadores = {};
                    const operadoresActivos = new Set();

                    // Función interna para crear el usuario si no existe
                    const registrarOperador = (nombre) => {
                        if (!nombre) return;
                        if (!operadores[nombre]) {
                            operadores[nombre] = { preparado: 0, digitalizado: 0, auditado: 0, rearmado: 0 };
                        }
                        operadoresActivos.add(nombre);
                    };

                    // Analizamos fila por fila la Hoja 1
                    resultadosHoja1.data.forEach(fila => {
                        const status = fila.status ? fila.status.trim().toLowerCase() : '';
                        
                        if (status === 'preparado' && fila.preparador) {
                            registrarOperador(fila.preparador);
                            operadores[fila.preparador].preparado += (parseInt(fila.hojas_prep) || 0);
                        } 
                        else if (status === 'digitalizado' && fila.user) {
                            registrarOperador(fila.user);
                            operadores[fila.user].digitalizado += (parseInt(fila.ima_dig) || 0);
                        }
                        else if (status === 'auditado' && fila.auditor) {
                            registrarOperador(fila.auditor);
                            operadores[fila.auditor].auditado += (parseInt(fila.ima_audi) || 0);
                        }
                        else if (status === 'rearmado' && fila.rearmador) {
                            registrarOperador(fila.rearmador);
                            operadores[fila.rearmador].rearmado += (parseInt(fila.hojas_prep) || 0); // Asume que usan la misma columna de hojas
                        }
                    });

                    // Luego leemos la Hoja 2 (Gerencias)
                    Papa.parse(URL_HOJA_2, {
                        download: true,
                        header: true,
                        complete: function(resultadosHoja2) {
                            
                            const gerencias = {};
                            let totalDigitalizadas = 0;

                            // Analizamos fila por fila la Hoja 2
                            resultadosHoja2.data.forEach(fila => {
                                const nombreGerencia = fila.gerencia ? fila.gerencia.trim() : null;
                                const cantidad = parseInt(fila.ima_dig) || 0;

                                if (nombreGerencia) {
                                    if (!gerencias[nombreGerencia]) gerencias[nombreGerencia] = 0;
                                    gerencias[nombreGerencia] += cantidad;
                                    totalDigitalizadas += cantidad;
                                }
                            });

                            // Ocultar mensaje de carga y mostrar paneles
                            document.getElementById('loading').style.display = 'none';
                            document.getElementById('kpi-panel').style.display = 'flex';
                            document.getElementById('charts-panel').style.display = 'grid';

                            // Actualizar KPIs
                            document.getElementById('kpi-operadores').innerText = operadoresActivos.size;
                            document.getElementById('kpi-total-img').innerText = totalDigitalizadas.toLocaleString('es-AR');

                            // Dibujar Gráfico 1: Operadores (Barras Apiladas o Agrupadas)
                            const nombresOperadores = Object.keys(operadores);
                            new Chart(document.getElementById('graficoOperadores'), {
                                type: 'bar',
                                data: {
                                    labels: nombresOperadores,
                                    datasets: [
                                        { label: 'Hojas Preparadas', data: nombresOperadores.map(op => operadores[op].preparado), backgroundColor: '#3b82f6' },
                                        { label: 'Img. Digitalizadas', data: nombresOperadores.map(op => operadores[op].digitalizado), backgroundColor: '#10b981' },
                                        { label: 'Img. Auditadas', data: nombresOperadores.map(op => operadores[op].auditado), backgroundColor: '#f59e0b' },
                                        { label: 'Hojas Rearmadas', data: nombresOperadores.map(op => operadores[op].rearmado), backgroundColor: '#8b5cf6' }
                                    ]
                                },
                                options: { 
                                    responsive: true, maintainAspectRatio: false,
                                    scales: { 
                                        x: { grid: { color: '#334155' } },
                                        y: { grid: { color: '#334155' }, beginAtZero: true }
                                    },
                                    color: '#cbd5e1',
                                    plugins: { legend: { labels: { color: '#cbd5e1' } } }
                                }
                            });

                            // Dibujar Gráfico 2: Gerencias (Barras Horizontales para leer mejor los nombres)
                            const nombresGerencias = Object.keys(gerencias);
                            const valoresGerencias = Object.values(gerencias);
                            
                            new Chart(document.getElementById('graficoGerencias'), {
                                type: 'bar', // Barra horizontal para nombres largos
                                data: {
                                    labels: nombresGerencias,
                                    datasets: [{
                                        label: 'Imágenes Digitalizadas',
                                        data: valoresGerencias,
                                        backgroundColor: 'rgba(56, 189, 248, 0.7)',
                                        borderColor: '#38bdf8',
                                        borderWidth: 1
                                    }]
                                },
                                options: { 
                                    indexAxis: 'y', // Lo hace horizontal
                                    responsive: true, maintainAspectRatio: false,
                                    scales: { 
                                        x: { grid: { color: '#334155' }, beginAtZero: true },
                                        y: { grid: { color: 'transparent' } }
                                    },
                                    color: '#cbd5e1',
                                    plugins: { legend: { display: false } } // Ocultamos leyenda por ser 1 sola métrica
                                }
                            });
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
